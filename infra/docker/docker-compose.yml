version: '3.8'

services:
  # ==================== INFRASTRUCTURE ====================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: doergo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doergo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doergo_secret}
      POSTGRES_DB: ${POSTGRES_DB:-doergo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doergo} -d ${POSTGRES_DB:-doergo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doergo-network

  redis:
    image: redis:7-alpine
    container_name: doergo-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doergo-network

  # ==================== BACKEND SERVICES ====================
  auth-service:
    build:
      context: ../../
      dockerfile: apps/api/auth-service/Dockerfile
    container_name: doergo-auth-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-doergo}:${POSTGRES_PASSWORD:-doergo_secret}@postgres:5432/${POSTGRES_DB:-doergo}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRATION=${JWT_ACCESS_EXPIRATION:-15m}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-24h}
      - JWT_REFRESH_EXPIRATION_REMEMBER=${JWT_REFRESH_EXPIRATION_REMEMBER:-30d}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - doergo-network

  task-service:
    build:
      context: ../../
      dockerfile: apps/api/task-service/Dockerfile
    container_name: doergo-task-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-doergo}:${POSTGRES_PASSWORD:-doergo_secret}@postgres:5432/${POSTGRES_DB:-doergo}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - doergo-network

  notification-service:
    build:
      context: ../../
      dockerfile: apps/api/notification-service/Dockerfile
    container_name: doergo-notification-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - doergo-network

  tracking-service:
    build:
      context: ../../
      dockerfile: apps/api/tracking-service/Dockerfile
    container_name: doergo-tracking-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-doergo}:${POSTGRES_PASSWORD:-doergo_secret}@postgres:5432/${POSTGRES_DB:-doergo}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - doergo-network

  api-gateway:
    build:
      context: ../../
      dockerfile: apps/api/gateway/Dockerfile
    container_name: doergo-api-gateway
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      - redis
      - auth-service
      - task-service
      - notification-service
      - tracking-service
    networks:
      - doergo-network

  # ==================== WEB APP ====================
  web-app:
    build:
      context: ../../
      dockerfile: apps/web-app/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
        - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Doergo}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: doergo-web-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      - api-gateway
    networks:
      - doergo-network

  # ==================== REVERSE PROXY ====================
  nginx:
    image: nginx:alpine
    container_name: doergo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-gateway
      - web-app
      - notification-service
    networks:
      - doergo-network

volumes:
  postgres_data:
    name: doergo-postgres-data
  redis_data:
    name: doergo-redis-data

networks:
  doergo-network:
    name: doergo-network
    driver: bridge
