version: '3.8'

# Development compose file - only infrastructure services
# Use this for local development: docker-compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: doergo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doergo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doergo_secret}
      POSTGRES_DB: ${POSTGRES_DB:-doergo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doergo} -d ${POSTGRES_DB:-doergo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: doergo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: doergo-postgres-data
  redis_data:
    name: doergo-redis-data
